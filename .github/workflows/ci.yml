name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Check imports
        run: |
          python -c "from skills.bybit_account_commander.src.sar_trend import compute_sar"
          python -c "from skills.bybit_account_commander.src.fees import compute_net_pnl"
          python -c "from skills.bybit_account_commander.src.execution.router import ExecutionRouter"
          python -c "from skills.bybit_account_commander.src.execution.entry_policy import decide_entry"
          echo 'All imports OK'
